<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="CSS/styleRegistro.css">
</head>
<body>

    <div class="login-card registro-card">
        <h1>Mundi<span>Connect</span></h1>
        
        <form action="inicioSesion.html"> <input type="text" placeholder="Nombre completo" required>
            
            <div class="form-row">
                <div class="input-group">
                    <label>Fecha de nacimiento</label>
                    <input type="date" required>
                </div>
                <div class="input-group">
                    <label>Género</label>
                    <select required>
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="M">Masculino</option>
                        <option value="F">Femenino</option>
                        <option value="O">Otro / Prefiero no decirlo</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <input type="text" placeholder="País" required>
                <input type="text" placeholder="Lugar de nacimiento" required>
            </div>

            <input type="email" placeholder="Correo electrónico" required>
            <input type="password" placeholder="Crea una contraseña" required>

            <div class="file-group">
                <label for="foto">Selecciona tu foto de perfil:</label>
                <input type="file" id="foto" accept="image/*">
            </div>
            
            <button type="submit" class="btn-entrar">CREAR CUENTA</button>
            
            <div class="links">
                <a href="inicioSesion.html">¿Ya tienes cuenta? Inicia sesión</a>
            </div>
        </form>
    </div>

</body>
</html>
