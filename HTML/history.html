<main class="mundiales-grid" id="world-cups-container">

<script>
    async function loadWorldCups() {
        const loggedUserId = localStorage.getItem('userId');
        const container = document.getElementById('world-cups-container');

        try {
            // Obtener mundiales a los que el usuario está suscrito
            const resSubs = await fetch(`http://localhost:3000/subscriptions/user/${loggedUserId}`);
            const subs = await resSubs.json();
            const subscribedIds = subs.map(s => s.id_world_cup);

            // Obtener todos los mundiales
            const resCups = await fetch('http://localhost:3000/worldcups');
            const allCups = await resCups.json();

            // Filtrar solo los mundiales a los que el usuario está suscrito
            const myCups = allCups.filter(cup => subscribedIds.includes(cup.id_world_cup));

            container.innerHTML = '';

            if (myCups.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <p>Aún no sigues ningún mundial.</p>
                        <a href="explore.html" style="color: #1B365D; font-weight: bold;">¡Ve a explorar y sigue tus favoritos!</a>
                    </div>`;
                return;
            }

            myCups.forEach(worldCup => {
                const year = worldCup.date ? worldCup.date.split('-')[0] : 'Unknown';
                const card = document.createElement('div');
                card.className = 'mundial-card'; 
                card.innerHTML = `
                    <img src="${worldCup.image_url}" class="mundial-foto" onerror="this.src='https://placehold.co/640x360/1B365D/FFFFFF?text=${worldCup.name}'">
                    <div class="card-content">
                        <h3>${worldCup.name.toUpperCase()}</h3>
                        <p>${worldCup.description || 'Sin descripción.'}</p>
                        <a href="../HTML/worldcup-details.html?year=${year}" class="btn-ver">Ver detalles y comentarios</a>
                    </div>
                `;
                container.appendChild(card);
            });

        } catch (error) {
            console.error('Error:', error);
            container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: red;">Error al conectar con el servidor.</p>';
        }
    }

    loadWorldCups();
    // Mostrar/Ocultar menú
const bellBtn = document.getElementById('notif-bell');
const dropdown = document.getElementById('notif-dropdown');

bellBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
});

// Cerrar al hacer clic fuera
document.addEventListener('click', () => dropdown.style.display = 'none');
//AQUI LE MOVI TAMBIEN!!! 
async function fetchNotifications() {
    const userId = localStorage.getItem('userId');
    const list = document.getElementById('notif-list');
    const badge = document.getElementById('notif-count');

    try {
        // CAMBIO AQUÍ: Ahora pedimos solo las notificaciones de ESTE usuario
        const res = await fetch(`http://localhost:3000/notifications/user/${userId}`);
        const myNotifs = await res.json();
        
        // Ya no necesitas el .filter(n => n.id_user == userId) aquí 
        // porque el servidor ya hizo ese trabajo por ti.

        const unread = myNotifs.filter(n => !n.is_read);

        if (unread.length > 0) {
            badge.innerText = unread.length;
            badge.style.display = 'block';
        }

        if (myNotifs.length > 0) {
            list.innerHTML = myNotifs.map(n => `
                <div class="notif-item ${n.is_read ? '' : 'unread'}">
                    <strong>${n.type.toUpperCase()}</strong>: ${n.message}
                    <div style="font-size: 0.7rem; color: #999; margin-top: 5px;">
                        ${new Date(n.created_at).toLocaleDateString()}
                    </div>
                </div>
            `).join('');
        }
    } catch (err) {
        console.error("Error al cargar notificaciones:", err);
    }
}
/// AQUI TERMINA!!

fetchNotifications();
</script>
