<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia</title>
    <link rel="stylesheet" href="../CSS/navbar.css">
    <link rel="stylesheet" href="../CSS/history.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-links">
                <a href="../HTML/home.html">Inicio</a>
                <a href="../HTML/explore.html">Explorar</a>
                <a href="../HTML/profile.html">Perfil</a>
                <a href="../HTML/history.html" class="active">Historial</a>
            </div>
            <div class="nav-search">
                <input type="text" placeholder="Buscar...">
                <button type="button">🔍</button>
            </div>
        </div>
    </nav>

    <div class="filter-section">
        <div class="filter-card">
            <div class="filter-group">
                <label>País Sede</label>
                <input type="text" placeholder="Ej: México, Brasil...">
            </div>
            <div class="filter-group">
                <label>Año Desde</label>
                <input type="number" placeholder="1930">
            </div>
            <div class="filter-group">
                <label>Año Hasta</label>
                <input type="number" placeholder="2026">
            </div>
            <button class="btn-buscar">Filtrar Historial</button>
        </div>
    </div>

<main class="mundiales-grid" id="world-cups-container">
        </main>

        <script>
            
    const worldCupsContainer = document.getElementById('world-cups-container');

    async function loadWorldCups() {
        try {
            const response = await fetch('http://localhost:3000/world-cups');
            
            if (!response.ok) {
                throw new Error('Error fetching world cups');
            }

            const worldCups = await response.json();

            worldCupsContainer.innerHTML = '';

            worldCups.forEach(worldCup => {
                const card = document.createElement('div');
                card.className = 'mundial-card'; 

                const displayImage = worldCup.image_url ? worldCup.image_url : `https://placehold.co/640x360/1B365D/FFFFFF?text=${worldCup.name}`;
                const year = worldCup.date ? worldCup.date.split('-')[0] : 'Unknown';

                card.innerHTML = `
                    <img src="${displayImage}" alt="World Cup ${worldCup.name}" class="mundial-foto">
                    <div class="card-content">
                        <h3>${worldCup.name.toUpperCase()} - ${worldCup.host ? worldCup.host.toUpperCase() : ''}</h3>
                        <p>${worldCup.description || 'No description available.'}</p>
                        
                        <a href="../HTML/worldcup-details.html?year=${year}" class="btn-ver">View more</a>
                    </div>
                `;

                worldCupsContainer.appendChild(card);
            });

            if(worldCups.length === 0){
                worldCupsContainer.innerHTML = '<p style="grid-column: 1 / -1; text-align: center;">No world cups registered yet.</p>';
            }

        } catch (error) {
            console.error('Error loading history:', error);
            worldCupsContainer.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: red;">Error connecting to the server.</p>';
        }
    }

    loadWorldCups();
</script>
<script src="search.js"></script>
</body>
</html>
