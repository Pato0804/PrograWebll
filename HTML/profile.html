<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MundiConnect - Mi Perfil</title>
    <link rel="stylesheet" href="../CSS/profile.css"> 
</head>
<body>

    <nav style="background: #1B365D; color: white; display: flex; justify-content: space-around; padding: 15px; position: fixed; top: 0; width: 100%; z-index: 1000;">
        <div>
            <a href="home.html" style="color: white; text-decoration: none; margin-right: 15px;">Inicio</a>
            <a href="explore.html" style="color: white; text-decoration: none; margin-right: 15px;">Explorar</a>
            <a href="profile.html" style="color: #FFD700; text-decoration: none; font-weight: bold; margin-right: 15px;">Perfil</a>
            <a href="history.html" style="color: white; text-decoration: none;">Historial</a>
        </div>
        <div>
            <input type="text" placeholder="Buscar..." style="padding: 5px; border-radius: 5px; border: none;">
        </div>
    </nav>

    <main class="perfil-layout">
        
        <div class="perfil-header">
            <div class="portada"></div>
            
            <div class="info-principal">
                <img id="user-photo" src="" alt="Foto de Perfil" class="foto-perfil" onerror="this.src='https://placehold.co/150x150/1B365D/FFFFFF?text=?'">
                
                <div class="datos-usuario">
                    <h1 id="user-name">Cargando Nombre...</h1>
                    <p id="user-subtitle">Cargando ubicación | correo...</p>
                    
                    <a href="../HTML/edit-profile.html" class="btn-editar-perfil">Editar Perfil</a>
                </div>
            </div>
        </div>

        <section class="mis-publicaciones">
            <h3>Mis memorias mundialistas</h3>
            
            <div class="post-card">
                <p style="color: #666; font-size: 0.9em;"><strong>Tú</strong> • Hace 1 día</p>
                <p>¡Esperando con ansias el próximo mundial en casa!</p>
                <div style="margin-top: 15px;">
                    <button style="background: #f0f2f5; border: 1px solid #ccc; padding: 5px 10px; border-radius: 5px; cursor: pointer;">⚽ 12 Me Gusta</button>
                    <button style="background: #f0f2f5; border: 1px solid #ccc; padding: 5px 10px; border-radius: 5px; cursor: pointer; color: red; margin-left: 10px;">🗑️ Eliminar</button>
                </div>
            </div>
        </section>

    </main>

    <script src="search.js"></script>

    <script>
        const loggedUserId = localStorage.getItem('userId');

        if (!loggedUserId) {
            window.location.href = 'login.html';
        }
        
        // Función para cargar los datos del usuario y mostrar en el perfil
        async function loadUserProfile() {
            try {
                const response = await fetch(`http://localhost:3000/users/${loggedUserId}`);
                
                if (!response.ok) {
                    throw new Error('User not found');
                }

                const userData = await response.json();

                document.getElementById('user-name').innerText = userData.full_name;

                const country = userData.country || 'Sin país';
                document.getElementById('user-subtitle').innerText = `${country} | ${userData.email}`;

                const profilePhoto = document.getElementById('user-photo');
                let urlFoto = userData.photo_url;

                // Si no hay foto en la BD se usan las iniciales
                if (!urlFoto || urlFoto.trim() === "") {
                
                    const iniciales = userData.full_name.substring(0, 2).toUpperCase();
                    urlFoto = `https://placehold.co/150x150/1B365D/FFFFFF?text=${iniciales}`;
                }

                profilePhoto.src = urlFoto;

            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('user-name').innerText = "Error al cargar perfil";
            }
        }

        loadUserProfile();
    </script>

</body>
</html>
