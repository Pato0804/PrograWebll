<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>

    <div class="login-card">
        <h1>Mundi<span>Connect</span></h1>
        <p>¡Ingresa a la cancha!</p>
        
        <form id="form-login">
            <div class="input-group">
                <input type="email" id="email" placeholder="Correo" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>
            <p></p>
            
            <button type="submit" class="btn-entrar">INICIAR SESIÓN</button>
            
            <div class="links">
                <hr>
                <a>¿Aún no tienes cuenta?</a>
                <a href="../HTML/register.html" class="btn-registro-link">REGISTRATE</a>
            </div>
        </form>
    </div>

<script>
    document.getElementById('form-login').addEventListener('submit', async (event) => {
        event.preventDefault(); // Evita que la página se recargue

        // 1. Extraer los datos
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // 2. Empaquetar los datos
        const loginData = {
            email: email,
            password: password
        };

        try {
            // 3. Hacer la petición al Backend (a nuestra nueva ruta /login)
            const response = await fetch('http://localhost:3000/users/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(loginData)
            });

            const data = await response.json();

            // 4. Evaluar la respuesta
            if (response.ok) {
                alert('✅ ' + data.message);
                
                // Opcional pero recomendado: Guardar el ID del usuario en el navegador 
                // para saber quién está conectado en las demás páginas (Entrega 2/3)
                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('userName', data.user.name);

                // Redirigir a la página principal
                window.location.href = 'home.html'; 
            } else {
                alert('❌ Error: ' + data.error);
            }
        } catch (error) {
            console.error('Error de red:', error);
            alert('🔌 Error al conectar con el servidor. ¿Está encendido Node.js?');
        }
    });
</script>

</body>
</html>
